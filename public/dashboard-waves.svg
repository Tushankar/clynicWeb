<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1600 1000" fill="none" preserveAspectRatio="xMidYMid slice">
  <!--
    Dashboard ambience: flowing thread bundles (top-right + bottom-left), recreated as a
    true-transparency vector in the style of the chosen "blue wavy forms" artwork.
    Kept deliberately sheer — the UI reads over it, never through it.
  -->
  <defs>
    <linearGradient id="ribbonA" x1="500" y1="0" x2="1600" y2="320" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#60A5FA" stop-opacity="0"/>
      <stop offset="0.45" stop-color="#3B82F6" stop-opacity="0.10"/>
      <stop offset="1" stop-color="#2563EB" stop-opacity="0.16"/>
    </linearGradient>
    <linearGradient id="ribbonB" x1="0" y1="680" x2="1150" y2="1000" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#2563EB" stop-opacity="0.14"/>
      <stop offset="0.55" stop-color="#3B82F6" stop-opacity="0.08"/>
      <stop offset="1" stop-color="#60A5FA" stop-opacity="0"/>
    </linearGradient>
    <linearGradient id="threadA" x1="500" y1="0" x2="1600" y2="300" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#93C5FD" stop-opacity="0"/>
      <stop offset="0.5" stop-color="#3B82F6" stop-opacity="0.35"/>
      <stop offset="1" stop-color="#2563EB" stop-opacity="0.5"/>
    </linearGradient>
    <linearGradient id="threadB" x1="0" y1="700" x2="1150" y2="1000" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#2563EB" stop-opacity="0.45"/>
      <stop offset="0.55" stop-color="#3B82F6" stop-opacity="0.3"/>
      <stop offset="1" stop-color="#93C5FD" stop-opacity="0"/>
    </linearGradient>
  </defs>

  <!-- ============ top-right sweep ============ -->
  <!-- sheer ribbons -->
  <path d="M 430 -60 C 780 250, 1120 40, 1660 330" stroke="url(#ribbonA)" stroke-width="150" stroke-linecap="round"/>
  <path d="M 560 -90 C 900 190, 1220 -10, 1680 210" stroke="url(#ribbonA)" stroke-width="86" stroke-linecap="round" opacity="0.8"/>
  <!-- hairline threads -->
  <path d="M 470 -40 C 800 236, 1140 40, 1640 306" stroke="url(#threadA)" stroke-width="1.4"/>
  <path d="M 492 -46 C 822 244, 1156 30, 1648 288" stroke="url(#threadA)" stroke-width="1.2"/>
  <path d="M 514 -52 C 846 254, 1172 22, 1656 272" stroke="url(#threadA)" stroke-width="1.3"/>
  <path d="M 538 -58 C 872 262, 1190 12, 1664 254" stroke="url(#threadA)" stroke-width="1.1"/>
  <path d="M 564 -66 C 898 268, 1208 2, 1672 238" stroke="url(#threadA)" stroke-width="1.4"/>
  <path d="M 590 -74 C 926 272, 1226 -8, 1680 220" stroke="url(#threadA)" stroke-width="1"/>
  <path d="M 448 -34 C 780 230, 1124 52, 1632 324" stroke="url(#threadA)" stroke-width="1.1"/>
  <path d="M 424 -28 C 760 222, 1108 66, 1624 344" stroke="url(#threadA)" stroke-width="0.9"/>

  <!-- ============ bottom-left sweep ============ -->
  <!-- sheer ribbons -->
  <path d="M -60 730 C 320 1010, 700 800, 1160 1070" stroke="url(#ribbonB)" stroke-width="150" stroke-linecap="round"/>
  <path d="M -80 850 C 300 1080, 660 900, 1120 1110" stroke="url(#ribbonB)" stroke-width="86" stroke-linecap="round" opacity="0.8"/>
  <!-- hairline threads -->
  <path d="M -40 760 C 330 1006, 706 806, 1150 1046" stroke="url(#threadB)" stroke-width="1.4"/>
  <path d="M -46 782 C 322 1016, 692 820, 1136 1058" stroke="url(#threadB)" stroke-width="1.2"/>
  <path d="M -52 804 C 314 1026, 678 834, 1122 1070" stroke="url(#threadB)" stroke-width="1.3"/>
  <path d="M -58 826 C 306 1036, 664 850, 1108 1082" stroke="url(#threadB)" stroke-width="1"/>
  <path d="M -34 740 C 340 996, 720 792, 1164 1034" stroke="url(#threadB)" stroke-width="1.1"/>
  <path d="M -28 720 C 350 986, 734 780, 1178 1022" stroke="url(#threadB)" stroke-width="0.9"/>
</svg>
